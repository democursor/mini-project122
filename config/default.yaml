storage:
  pdf_directory: ./data/pdfs
  max_file_size_mb: 50

processing:
  max_concurrent_documents: 10
  retry_attempts: 3

extraction:
  domain: general  # Options: scientific, biomedical, computer_science, general
  use_domain_models: false  # Set to false to use lightweight models only
  max_entities: 50
  max_keyphrases: 20

logging:
  level: INFO
  file: ./data/logs/app.log

neo4j:
  uri: neo4j://127.0.0.1:7687
  user: neo4j
  password: Yadav2480@
  database: miniproject

vector:
  persist_directory: ./data/chroma
  embedding_model: all-MiniLM-L6-v2
  batch_size: 32

rag:
  llm_provider: google  # openai, google, or ollama
  llm_model: gemini-2.5-flash  # Auto-detected: gemini-2.5-flash, gemini-2.5-pro, gemini-2.0-flash
  max_context_tokens: 6000
  max_response_tokens: 3000
  temperature: 0.5
  top_k_retrieval: 15
